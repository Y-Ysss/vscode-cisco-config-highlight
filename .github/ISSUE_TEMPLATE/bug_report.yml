name: Bug Report
description: Report a bug or unexpected behavior
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide as much detail as possible.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A clear and concise summary of the bug.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Open ...
        2. Run ...
        3. See error ...

  - type: input
    id: extension-version
    attributes:
      label: Extension Version
      description: Version shown in VS Code extension details
      placeholder: e.g. 0.12.0

  - type: input
    id: vscode-version
    attributes:
      label: VS Code Version
      placeholder: e.g. 1.102.0
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. Windows 11 / macOS 15 / Ubuntu 24.04
    validations:
      required: true

  - type: dropdown
    id: reproducibility
    attributes:
      label: Reproducibility
      options:
        - Always
        - Sometimes
        - Rarely
    validations:
      required: true

  - type: textarea
    id: sample-config
    attributes:
      label: Sample Cisco Config (Minimal)
      description: Paste a minimal config snippet that reproduces the issue.
      render: shell

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste error logs or attach screenshots if available.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I can reproduce this issue with the latest release.
          required: false
