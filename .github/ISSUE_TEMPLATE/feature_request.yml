name: Feature Request
description: Suggest a new feature or enhancement
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing your idea. Clear use-cases help us prioritize.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem are you trying to solve?
      placeholder: Describe the pain point or limitation.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: What would you like to see?
      placeholder: Describe the expected behavior or UX.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches you considered?

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Syntax Highlighting
        - Diagnostics / Validation
        - Outline / Symbol View
        - Performance
        - Developer Experience
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: sample-config
    attributes:
      label: Sample Cisco Config (Optional)
      description: If relevant, include a sample config snippet.
      render: shell

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Mockups, references, links, or related issues.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I understand that this extension focuses on Cisco configuration files, and support for non-Cisco files is out of scope.
          required: true
        - label: I searched existing issues and did not find a duplicate.
          required: true
